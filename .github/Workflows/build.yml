name: Build & Release EXE

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # ✅ Checkout repo
    - name: Checkout repo
      uses: actions/checkout@v4

    # ✅ Setup Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ✅ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller opencv-python numpy pillow

    # ✅ Generate version (date + commit)
    - name: Generate version
      id: version
      run: |
        $date = Get-Date -Format "yyyy.MM.dd"
        $shortSha = "${{ github.sha }}".Substring(0,7)
        $version = "$date-$shortSha"
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    # ✅ Build EXE (no console + icon)
    - name: Build EXE
      run: |
        pyinstaller --clean --onefile --noconsole --icon=icon.ico --name UnderwaterEnhancer enhance_underwater.py

    # ✅ Rename EXE
    - name: Rename EXE
      id: rename
      run: |
        $exeName = "UnderwaterEnhancer-${{ steps.version.outputs.VERSION }}.exe"
        Rename-Item dist/UnderwaterEnhancer.exe $exeName
        echo "EXE_NAME=$exeName" >> $env:GITHUB_OUTPUT

    # ✅ Create ZIP
    - name: Create ZIP
      run: |
        $zipName = "UnderwaterEnhancer-${{ steps.version.outputs.VERSION }}.zip"
        Compress-Archive -Path dist/${{ steps.rename.outputs.EXE_NAME }} -DestinationPath dist/$zipName

    # ✅ Upload artifact (optional backup)
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: underwater-build
        path: dist/*

    # ✅ Create NEW release each build
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ steps.version.outputs.VERSION }}
        name: Underwater Enhancer Build ${{ steps.version.outputs.VERSION }}
        body: |
          ✅ Automated GUI Build

          Version: ${{ steps.version.outputs.VERSION }}
          Commit: ${{ github.sha }}

          Features:
          - Live preview
          - Adjustable sliders
          - Batch processing

          Files:
          - EXE (no console)
          - ZIP package
        files: |
          dist/*.exe
          dist/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
``
